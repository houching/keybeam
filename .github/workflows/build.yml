name: Build KeyBeam Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Standalone Windows EXE
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout Repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js & Build Web Client
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install Node Dependencies
        run: |
          cd client
          npm ci

      - name: Build Web Client
        run: |
          cd client
          npm run build

      # 3. Setup Python & UV Package Manager
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'server/requirements.txt'

      # 4. Cache PyInstaller build outputs to accelerate compilation
      - name: PyInstaller Cache
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pyinstaller\Cache
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('server/requirements.txt', 'server/app.py') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      # 5. Install Python Dependencies & Generate Build Assets
      - name: Install Dependencies & Generate Assets
        run: |
          cd server
          uv pip install --system pyinstaller -r requirements.txt
          python generate_ico.py
          python create_version_info.py

      # 6. Compile Standalone Windowless Executable
      - name: Build EXE with PyInstaller
        run: |
          cd server
          python -m PyInstaller --onefile --noconsole --name KeyBeam --icon=icon.ico --version-file=version_info.txt --add-data "../client/dist;client_dist" app.py

      # 7. Create Portable Zip Archive
      - name: Create Portable Zip
        run: Compress-Archive -Path server/dist/KeyBeam.exe -DestinationPath server/dist/KeyBeam.zip

      # 8. Upload Built Artifacts
      - name: Upload KeyBeam Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KeyBeam-Windows-Portable
          path: |
            server/dist/KeyBeam.exe
            server/dist/KeyBeam.zip
          if-no-files-found: error

      # 9. Auto-Create Release & Upload Binary (triggers on 'v*' tag pushes)
      - name: Upload Binary to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            server/dist/KeyBeam.exe
            server/dist/KeyBeam.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
